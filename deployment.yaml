apiVersion: v1
kind: Service
metadata:
  name: devops-svc
spec:
  type: NodePort
  selector:
    app: devops
  ports:
    - name: api
      port: 8000
      targetPort: 8000
      nodePort: 30005

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-devops
  labels:
    app: devops
spec:
  replicas: 5
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
        - name: api
          image: mmalacrida/devops26:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-notificacao
  labels:
    app: deploy-notificacao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deploy-notificacao
  template:
    metadata:
      labels:
        app: deploy-notificacao
    spec:
      containers:
        - name: api-notificacao
          image: mmalacrida/devops26:latest
          imagePullPolicy: Never
          args:
            - "-e"
            - "notificacao:APP_NOTIFICACAO"
          ports:
            - containerPort: 8000